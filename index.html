<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD · Preview</title>

  <link rel="stylesheet" href="css/github-dark.min.css">
  <script src="js/marked.min.js"></script>
  <script src="js/highlight.min.js"></script>
  <!-- Mermaid v8: render(id, code, callback) API が確実に使える -->
  <script src="js/mermaid.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+JP:wght@300;400;500;600&family=Syne:wght@700;800&display=swap');

    :root {
      --bg: #0f1117;
      --surface: #171b26;
      --panel: #1d2232;
      --border: #2a3050;
      --accent: #3b6ef8;
      --accent2: #00d4aa;
      --text: #dde3f0;
      --text-mute: #6b7899;
      --heading: #ffffff;
      --code-bg: #0a0d14;
      --warn-bg: rgba(255, 190, 50, 0.08);
      --warn-bdr: #e6a817;
      --info-bg: rgba(59, 110, 248, 0.08);
      --info-bdr: #3b6ef8;
      --tip-bg: rgba(0, 212, 170, 0.08);
      --tip-bdr: #00d4aa;
      --danger-bg: rgba(240, 70, 80, 0.08);
      --danger-bdr: #f04650;
      --radius: 6px;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans JP', sans-serif;
      --display: 'Syne', sans-serif;
    }

    :root[data-theme='light'] {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --panel: #f1f3f5;
      --border: #dee2e6;
      --accent: #3b6ef8;
      --accent2: #00a884;
      --text: #212529;
      --text-mute: #6c757d;
      --heading: #111111;
      --code-bg: #e9ecef;
      --warn-bg: rgba(255, 190, 50, 0.15);
      --warn-bdr: #e6a817;
      --info-bg: rgba(59, 110, 248, 0.1);
      --info-bdr: #3b6ef8;
      --tip-bg: rgba(0, 212, 170, 0.1);
      --tip-bdr: #00d4aa;
      --danger-bg: rgba(240, 70, 80, 0.1);
      --danger-bdr: #f04650;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
    }

    /* HEADER */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--display);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .08em;
      color: var(--heading);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo span {
      color: var(--accent);
    }

    .logo .dot {
      width: 6px;
      height: 6px;
      background: var(--accent2);
      border-radius: 50%;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .04em;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(59, 110, 248, .08);
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn.primary:hover {
      background: #5580fa;
    }

    /* LAYOUT */
    #app {
      display: grid;
      grid-template-columns: 1fr 4px 1fr;
      height: calc(100vh - 48px);
    }

    .pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 36px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .pane-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      color: var(--text-mute);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pane-label::before {
      content: '';
      display: block;
      width: 3px;
      height: 12px;
      background: var(--accent);
      border-radius: 2px;
    }

    .pane-label.green::before {
      background: var(--accent2);
    }

    /* EDITOR */
    #editor {
      flex: 1;
      width: 100%;
      padding: 20px;
      background: var(--panel);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.75;
      border: none;
      outline: none;
      resize: none;
      tab-size: 2;
      overflow: auto;
    }

    #editor::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    #editor::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* PREVIEW */
    #preview-wrap {
      flex: 1;
      overflow: auto;
      background: var(--panel);
    }

    #preview-wrap::-webkit-scrollbar {
      width: 6px;
    }

    #preview-wrap::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    #preview {
      padding: 28px 32px;
      max-width: 860px;
      margin: 0 auto;
    }

    /* RAW VIEW */
    #raw-view {
      display: none;
      flex: 1;
      overflow: auto;
      background: var(--code-bg);
    }

    #raw-view pre {
      margin: 0;
      padding: 20px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      color: #8ba5d4;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* MARKDOWN STYLES */
    #preview h1,
    #preview h2,
    #preview h3,
    #preview h4 {
      font-family: var(--display);
      font-weight: 700;
      line-height: 1.3;
      color: var(--heading);
    }

    #preview h1 {
      font-size: 26px;
      margin: 0 0 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--accent);
    }

    #preview h2 {
      font-size: 20px;
      margin: 36px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    #preview h3 {
      font-size: 16px;
      margin: 28px 0 12px;
      color: var(--accent2);
    }

    #preview h4 {
      font-size: 14px;
      margin: 20px 0 8px;
      color: var(--text-mute);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    #preview p {
      margin: 0 0 14px;
    }

    #preview ul,
    #preview ol {
      margin: 0 0 14px 20px;
    }

    #preview li {
      margin-bottom: 4px;
    }

    #preview a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    #preview hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    #preview table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 13px;
    }

    #preview th {
      background: var(--surface);
      color: var(--text-mute);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    #preview td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
    }

    #preview tr:hover td {
      background: rgba(59, 110, 248, .04);
    }

    #preview strong {
      color: var(--heading);
      font-weight: 600;
    }

    #preview em {
      color: var(--accent2);
      font-style: italic;
    }

    #preview code:not(.hljs) {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--code-bg);
      color: var(--accent2);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    #preview pre {
      background: var(--code-bg) !important;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      margin: 16px 0;
      overflow: auto;
      position: relative;
    }

    #preview pre::before {
      content: attr(data-lang);
      position: absolute;
      top: 8px;
      right: 12px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-mute);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    #preview pre code {
      display: block;
      padding: 16px 20px;
      font-family: var(--mono) !important;
      font-size: 12.5px;
      line-height: 1.7;
      background: transparent !important;
      color: #c9d1d9;
      border: none !important;
    }

    /* ALERTS */
    .alert {
      border-radius: var(--radius);
      padding: 14px 16px;
      margin: 16px 0;
      border-left: 3px solid;
      display: flex;
      gap: 12px;
    }

    .alert-icon {
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .alert-title {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .alert-content {
      font-size: 13px;
    }

    .alert-note {
      background: var(--info-bg);
      border-color: var(--info-bdr);
    }

    .alert-note .alert-title {
      color: var(--info-bdr);
    }

    .alert-tip {
      background: var(--tip-bg);
      border-color: var(--tip-bdr);
    }

    .alert-tip .alert-title {
      color: var(--tip-bdr);
    }

    .alert-warning {
      background: var(--warn-bg);
      border-color: var(--warn-bdr);
    }

    .alert-warning .alert-title {
      color: var(--warn-bdr);
    }

    .alert-danger {
      background: var(--danger-bg);
      border-color: var(--danger-bdr);
    }

    .alert-danger .alert-title {
      color: var(--danger-bdr);
    }

    .alert-caution {
      background: var(--danger-bg);
      border-color: var(--danger-bdr);
    }

    .alert-caution .alert-title {
      color: var(--danger-bdr);
    }

    .alert-important {
      background: var(--info-bg);
      border-color: var(--accent2);
    }

    .alert-important .alert-title {
      color: var(--accent2);
    }

    /* MERMAID */
    .mermaid-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin: 16px 0;
      text-align: center;
      overflow: auto;
    }

    .mermaid-wrap svg {
      max-width: 100%;
      height: auto;
    }

    /* STATUS BAR */
    #statusbar {
      height: 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 20px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-mute);
      letter-spacing: .06em;
      flex-shrink: 0;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat .dot {
      width: 5px;
      height: 5px;
      background: var(--accent2);
      border-radius: 50%;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--accent2);
      color: var(--accent2);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .06em;
      padding: 8px 20px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: all .25s;
      z-index: 999;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* DIVIDER */
    #divider {
      width: 4px;
      background: var(--border);
      cursor: col-resize;
      transition: background .15s;
    }

    #divider:hover,
    #divider.dragging {
      background: var(--accent);
    }
  </style>
</head>

<body>

  <div id="header">
    <div class="logo">
      <div class="dot"></div>MD<span>·</span>PREVIEW
    </div>
    <div class="header-actions">
      <button class="btn" onclick="toggleTheme()">テーマ切替</button>
      <button class="btn" onclick="showAppSource()">全ソース表示</button>
      <button class="btn" id="btn-raw" onclick="toggleRaw()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="16 18 22 12 16 6" />
          <polyline points="8 6 2 12 8 18" />
        </svg>ソース表示
      </button>
      <button class="btn" onclick="clearEditor()">クリア</button>
      <button class="btn" onclick="document.getElementById('sample-dlg').showModal()">入力例表示</button>
      <button class="btn primary" onclick="downloadHTML()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>HTML保存
      </button>
    </div>
  </div>

  <div id="app">
    <div class="pane">
      <div class="pane-header">
        <span class="pane-label">MARKDOWN / MERMAID EDITOR</span>
      </div>
      <textarea id="editor" spellcheck="false"></textarea>
      <div id="statusbar">
        <span class="stat"><span class="dot"></span><span id="stat-lines">0 lines</span></span>
        <span class="stat">chars: <span id="stat-chars">0</span></span>
      </div>
    </div>

    <div id="divider"></div>

    <div class="pane">
      <div class="pane-header">
        <span class="pane-label green">HTML PREVIEW</span>
      </div>
      <div id="preview-wrap">
        <div id="preview"></div>
      </div>
      <div id="raw-view">
        <pre id="raw-content"></pre>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <style>
    #sample-dlg::backdrop, #app-src-dlg::backdrop {background:rgba(0,0,0,0.6);backdrop-filter:blur(2px)}
  </style>

  <dialog id="app-src-dlg" style="margin:auto;border:none;border-radius:8px;background:var(--surface);color:var(--text);padding:0;max-width:800px;width:90%;box-shadow:0 10px 30px rgba(0,0,0,0.5);">
    <div class="dlg-header" style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)">
      <h4 style="margin:0;color:var(--heading)">index.html 全ソースコード</h4>
      <div class="dlg-actions" style="display:flex;align-items:center;gap:12px">
        <button class="btn primary" onclick="copyAppSource()">クリップボードにコピー</button>
        <button class="dlg-close" onclick="document.getElementById('app-src-dlg').close()" style="background:transparent;border:none;color:var(--text-mute);font-size:20px;cursor:pointer;line-height:1;transition:color 0.2s">&times;</button>
      </div>
    </div>
    <div class="dlg-body" style="padding:0;max-height:70vh;overflow-y:auto;background:var(--code-bg)">
      <pre id="app-src-content" style="margin:0;padding:20px;background:transparent;border:none;font-size:12px;line-height:1.7;color:#8ba5d4;white-space:pre-wrap;word-break:break-all"></pre>
    </div>
  </dialog>

  <dialog id="sample-dlg" style="margin:auto;border:none;border-radius:8px;background:var(--surface);color:var(--text);padding:0;max-width:800px;width:90%;box-shadow:0 10px 30px rgba(0,0,0,0.5);">
    <div class="dlg-header" style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)">
      <h4 style="margin:0;color:var(--heading)">MD Preview 入力例</h4>
      <div class="dlg-actions" style="display:flex;align-items:center;gap:12px">
        <button class="btn primary" onclick="insertSampleAndClose()">入力例をコードに反映</button>
        <button class="dlg-close" onclick="document.getElementById('sample-dlg').close()" style="background:transparent;border:none;color:var(--text-mute);font-size:20px;cursor:pointer;line-height:1;transition:color 0.2s">&times;</button>
      </div>
    </div>
    <div class="dlg-body" style="padding:0;max-height:70vh;overflow-y:auto;background:var(--code-bg)">
      <pre id="sample-code-pre" style="margin:0;padding:20px;background:transparent;border:none;font-size:12px;line-height:1.7;color:#8ba5d4;white-space:pre-wrap;word-break:break-all"></pre>
    </div>
  </dialog>

  <script>
    const SAMPLE = `# プロジェクト設計ドキュメント

## 1. 概要

このドキュメントは **システム設計** の概要を説明します。
各セクションで仕様・構成・注記を確認してください。

---

## 2. アーキテクチャ

### 2.1 システム構成図

\`\`\`mermaid
graph TD
  A[クライアント] -->|HTTPS| B[API Gateway]
  B --> C[認証サービス]
  B --> D[ビジネスロジック]
  D --> E[(データベース)]
  D --> F[キャッシュ層]
\`\`\`

### 2.2 シーケンス図

\`\`\`mermaid
sequenceDiagram
  participant U as ユーザー
  participant A as APIサーバー
  participant D as DB
  U->>A: ログインリクエスト
  A->>D: 認証情報照会
  D-->>A: 結果返却
  A-->>U: JWTトークン発行
\`\`\`

---

## 3. API仕様

### 3.1 エンドポイント一覧

| メソッド | パス | 説明 |
|--------|------|------|
| GET | /api/users | ユーザー一覧取得 |
| POST | /api/users | ユーザー作成 |
| PUT | /api/users/:id | ユーザー更新 |
| DELETE | /api/users/:id | ユーザー削除 |

### 3.2 レスポンス例

\`\`\`json
{
  "status": "success",
  "data": {
    "id": "usr_001",
    "name": "山田 太郎",
    "role": "admin"
  }
}
\`\`\`

---

## 4. コード例

#### 4.1 認証ミドルウェア

\`\`\`javascript
const authMiddleware = async (req, res, next) => {
  const token = req.headers.authorization?.split(' ')[1];
  if (!token) return res.status(401).json({ error: 'Unauthorized' });
  try {
    const payload = jwt.verify(token, process.env.JWT_SECRET);
    req.user = payload;
    next();
  } catch (err) {
    return res.status(403).json({ error: 'Invalid token' });
  }
};
\`\`\`

#### 4.2 データ取得クエリ

\`\`\`sql
SELECT u.id, u.name, u.email, r.name AS role
FROM users u
JOIN roles r ON u.role_id = r.id
WHERE u.active = true
ORDER BY u.created_at DESC
LIMIT 100;
\`\`\`

---

## 5. 注記・アラート

> [!NOTE]
> このAPIは **v2.0以降** でのみ利用可能です。旧バージョンとの互換性はありません。

> [!TIP]
> キャッシュを活用することで、DBへの負荷を最大 *60%* 削減できます。

> [!WARNING]
> 本番環境への直接デプロイは禁止されています。

> [!DANGER]
> APIキーを **絶対に** リポジトリにコミットしないでください。

> [!IMPORTANT]
> マイグレーションは **バックアップ取得後** に実行してください。

---

## 6. マイルストーン

\`\`\`mermaid
gantt
  title 開発スケジュール
  dateFormat  YYYY-MM-DD
  section 設計
  要件定義      :done, 2024-01-01, 2024-01-15
  技術選定      :done, 2024-01-10, 2024-01-20
  section 開発
  バックエンド  :active, 2024-01-20, 2024-03-01
  フロントエンド:        2024-02-01, 2024-03-15
  section テスト
  結合テスト    :        2024-03-01, 2024-03-20
  本番リリース  :milestone, 2024-03-25, 0d
\`\`\`
`;

    // ── Mermaid 初期化 ──────────────────────────────────────
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      securityLevel: 'loose',
      themeVariables: {
        background: '#171b26',
        primaryColor: '#1d2232',
        primaryTextColor: '#dde3f0',
        primaryBorderColor: '#3b6ef8',
        lineColor: '#6b7899',
        secondaryColor: '#1d2232',
        tertiaryColor: '#0f1117',
      }
    });

    // ── marked セットアップ ────────────────────────────────
    marked.setOptions({ breaks: true, gfm: true });

    const ALERT_MAP = {
      note: { icon: 'ℹ', label: 'Note' },
      tip: { icon: '💡', label: 'Tip' },
      warning: { icon: '⚠', label: 'Warning' },
      danger: { icon: '🚨', label: 'Danger' },
      caution: { icon: '⛔', label: 'Caution' },
      important: { icon: '★', label: 'Important' },
    };

    // mermaidコードをパース時に配列へ退避し、プレースホルダを出力
    const mermaidQueue = [];

    const renderer = new marked.Renderer();

    renderer.blockquote = function (token) {
      const text = typeof token === 'string' ? token : (token.text || '');
      const m = text.match(/^\s*<p>\[!(NOTE|TIP|WARNING|DANGER|CAUTION|IMPORTANT)\]\s*([\s\S]*?)<\/p>\s*$/i);
      if (m) {
        const type = m[1].toLowerCase();
        const info = ALERT_MAP[type] || { icon: 'ℹ', label: type };
        return `<div class="alert alert-${type}"><div class="alert-icon">${info.icon}</div><div class="alert-body"><div class="alert-title">${info.label}</div><div class="alert-content">${m[2].trim()}</div></div></div>`;
      }
      return `<blockquote>${text}</blockquote>`;
    };

    renderer.code = function (code, lang) {
      // marked v9: code(code, lang, escaped) の3引数で渡される
      lang = lang || '';

      if (lang === 'mermaid') {
        const idx = mermaidQueue.length;
        mermaidQueue.push(code);
        // プレースホルダ: data-idx でコードを引き当てる
        return `<div class="mermaid-wrap" id="mm-wrap-${idx}"></div>`;
      }

      const highlighted = lang && hljs.getLanguage(lang)
        ? hljs.highlight(code, { language: lang }).value
        : hljs.highlightAuto(code).value;
      return `<pre data-lang="${lang}"><code class="hljs">${highlighted}</code></pre>`;
    };

    marked.use({ renderer });

    // ── レンダリング ────────────────────────────────────────
    let renderTimer = null;
    let mmSeq = 0; // Mermaid の render ID は毎回ユニークにする必要がある

    async function render() {
      const src = document.getElementById('editor').value;
      document.getElementById('stat-lines').textContent = src.split('\n').length + ' lines';
      document.getElementById('stat-chars').textContent = src.length;

      // mermaidQueue をリセットしてから parse
      mermaidQueue.length = 0;
      const html = marked.parse(src);

      const preview = document.getElementById('preview');
      preview.innerHTML = html;

      // プレースホルダに Mermaid SVG を注入
      for (let idx = 0; idx < mermaidQueue.length; idx++) {
        const wrap = document.getElementById('mm-wrap-' + idx);
        if (!wrap) continue;
        const code = mermaidQueue[idx];
        const id = 'mermaid-svg-' + (++mmSeq);
        try {
          // v8 API: render(id, code, callback)
          mermaid.render(id, code, (svg) => {
            wrap.innerHTML = svg;
          });
        } catch (e) {
          wrap.innerHTML = `<pre style="color:#f04650;font-size:12px;font-family:monospace;text-align:left;white-space:pre-wrap">Mermaid error:\n${e.message}</pre>`;
        }
      }
    }

    function scheduleRender() {
      clearTimeout(renderTimer);
      renderTimer = setTimeout(render, 400);
    }

    // ── ソース表示切替 ──────────────────────────────────────
    let rawVisible = false;
    function toggleRaw() {
      rawVisible = !rawVisible;
      document.getElementById('preview-wrap').style.display = rawVisible ? 'none' : '';
      document.getElementById('raw-view').style.display = rawVisible ? 'block' : 'none';
      if (rawVisible) document.getElementById('raw-content').textContent = document.getElementById('editor').value;
      document.getElementById('btn-raw').innerHTML = rawVisible
        ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>プレビュー表示`
        : `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>ソース表示`;
    }

    // ── HTML ダウンロード ───────────────────────────────────
    function downloadHTML() {
      const body = document.getElementById('preview').innerHTML;
      const raw = document.getElementById('editor').value
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const out = `<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Exported</title>
<style>
:root{--bg:#0f1117;--surface:#171b26;--panel:#1d2232;--border:#2a3050;--accent:#3b6ef8;--accent2:#00d4aa;--text:#dde3f0;--text-mute:#6b7899;--code-bg:#0a0d14;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:sans-serif;font-size:14px;line-height:1.6;padding:40px}
.wrap{max-width:860px;margin:0 auto}
h1{font-size:26px;margin:0 0 24px;padding-bottom:12px;border-bottom:2px solid var(--accent);color:#fff}
h2{font-size:20px;margin:36px 0 16px;padding-bottom:8px;border-bottom:1px solid var(--border);color:#fff}
h3{font-size:16px;margin:28px 0 12px;color:var(--accent2)}
h4{font-size:14px;margin:20px 0 8px;color:var(--text-mute);text-transform:uppercase}
p{margin:0 0 14px}ul,ol{margin:0 0 14px 20px}li{margin-bottom:4px}
table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
th{background:var(--surface);color:var(--text-mute);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:9px 14px;border-bottom:1px solid var(--border)}
pre{background:var(--code-bg);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:6px;margin:16px 0;overflow:auto;padding:16px 20px}
code{font-family:monospace;font-size:12px;background:var(--code-bg);color:var(--accent2);padding:2px 6px;border-radius:3px}
pre code{background:transparent;color:#c9d1d9;padding:0}
hr{border:none;border-top:1px solid var(--border);margin:28px 0}
strong{color:#fff}em{color:var(--accent2)}
.alert{border-radius:6px;padding:14px 16px;margin:16px 0;border-left:3px solid;display:flex;gap:12px}
.alert-note{background:rgba(59,110,248,.08);border-color:#3b6ef8}.alert-note .alert-title{color:#3b6ef8}
.alert-tip{background:rgba(0,212,170,.08);border-color:#00d4aa}.alert-tip .alert-title{color:#00d4aa}
.alert-warning{background:rgba(255,190,50,.08);border-color:#e6a817}.alert-warning .alert-title{color:#e6a817}
.alert-danger{background:rgba(240,70,80,.08);border-color:#f04650}.alert-danger .alert-title{color:#f04650}
.alert-important{background:rgba(59,110,248,.08);border-color:#00d4aa}.alert-important .alert-title{color:#00d4aa}
.alert-title{font-weight:600;font-size:13px;margin-bottom:4px}.alert-icon{font-size:16px;flex-shrink:0}
.mermaid-wrap{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:20px;margin:16px 0;text-align:center}
.mermaid-wrap svg{max-width:100%;height:auto}
.tbtn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:11px;cursor:pointer;margin-bottom:20px}
dialog{margin:auto;border:none;border-radius:8px;background:var(--surface);color:var(--text);padding:0;max-width:800px;width:90%;box-shadow:0 10px 30px rgba(0,0,0,0.5);overflow:hidden}
dialog::backdrop{background:rgba(0,0,0,0.6);backdrop-filter:blur(2px)}
.dlg-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.dlg-header h4{margin:0;color:#fff}
.dlg-actions{display:flex;align-items:center;gap:12px}
.dlg-copy{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;transition:all 0.2s}
.dlg-copy:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.dlg-close{background:transparent;border:none;color:var(--text-mute);font-size:20px;cursor:pointer;line-height:1;transition:color 0.2s}
.dlg-close:hover{color:#fff}
.dlg-body{padding:0;max-height:70vh;overflow-y:auto;background:var(--code-bg)}
.dlg-body pre{margin:0;padding:20px;background:transparent;border:none;font-size:12px;line-height:1.7;color:#8ba5d4;white-space:pre-wrap;word-break:break-all}
</style></head><body>
<div class="wrap">
<button class="tbtn" onclick="document.getElementById('src-dlg').showModal()">&#60;/&#62; ソース表示</button>
${body}
<dialog id="src-dlg">
  <div class="dlg-header">
    <h4>Markdown Source</h4>
    <div class="dlg-actions">
      <button class="dlg-copy" onclick="var b=this;navigator.clipboard.writeText(document.getElementById('raw-code').textContent).then(()=>{var o=b.innerHTML;b.innerHTML='コピーしました！';setTimeout(()=>b.innerHTML=o,2000)})">コピー</button>
      <button class="dlg-close" onclick="document.getElementById('src-dlg').close()">&times;</button>
    </div>
  </div>
  <div class="dlg-body"><pre id="raw-code">${raw}</pre></div>
</dialog>
</div></body></html>`;
      const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(new Blob([out], { type: 'text/html;charset=utf-8' })),
        download: 'document.html'
      });
      a.click();
      showToast('✓ HTMLを保存しました');
    }

    // ── テーマ切替 ──────────────────────────────────────────
    function toggleTheme() {
      const root = document.documentElement;
      const t = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      root.setAttribute('data-theme', t);
      const isLight = t === 'light';
      
      // Mermaid 再初期化用パラメータ
      mermaid.initialize({
        startOnLoad: false,
        theme: isLight ? 'base' : 'dark',
        securityLevel: 'loose',
        themeVariables: isLight ? {
          background: '#ffffff',
          primaryColor: '#f1f3f5',
          primaryTextColor: '#212529',
          primaryBorderColor: '#3b6ef8',
          lineColor: '#6c757d',
          secondaryColor: '#f1f3f5',
          tertiaryColor: '#f8f9fa',
        } : {
          background: '#171b26',
          primaryColor: '#1d2232',
          primaryTextColor: '#dde3f0',
          primaryBorderColor: '#3b6ef8',
          lineColor: '#6b7899',
          secondaryColor: '#1d2232',
          tertiaryColor: '#0f1117',
        }
      });
      render();
    }

    // ── アプリ全体のソースコード表示 ────────────────────────────────
    function showAppSource() {
      fetch(location.href)
        .then(res => res.text())
        .then(text => {
          document.getElementById('app-src-content').textContent = text;
          document.getElementById('app-src-dlg').showModal();
        })
        .catch(err => {
          // ローカルなどでfetchが失敗した時のフォールバック
          const html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
          document.getElementById('app-src-content').textContent = html;
          document.getElementById('app-src-dlg').showModal();
        });
    }

    function copyAppSource() {
      const text = document.getElementById('app-src-content').textContent;
      navigator.clipboard.writeText(text).then(() => {
        showToast('✓ クリップボードにコピーしました');
      });
    }

    // ── ユーティリティ ──────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
    function clearEditor() { document.getElementById('editor').value = ''; render(); }
    function insertSampleAndClose() {
      document.getElementById('editor').value = SAMPLE;
      render();
      document.getElementById('sample-dlg').close();
    }

    // ── ドラッグ分割 ────────────────────────────────────────
    const divider = document.getElementById('divider');
    const appEl = document.getElementById('app');
    let dragging = false;
    divider.addEventListener('mousedown', e => { dragging = true; divider.classList.add('dragging'); e.preventDefault(); });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const r = appEl.getBoundingClientRect();
      const pct = Math.min(80, Math.max(20, (e.clientX - r.left) / r.width * 100));
      appEl.style.gridTemplateColumns = `${pct.toFixed(1)}fr 4px ${(100 - pct).toFixed(1)}fr`;
    });
    document.addEventListener('mouseup', () => { dragging = false; divider.classList.remove('dragging'); });

    // ── Tab キー ────────────────────────────────────────────
    document.getElementById('editor').addEventListener('keydown', e => {
      if (e.key !== 'Tab') return;
      e.preventDefault();
      const ta = e.target, s = ta.selectionStart;
      ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(ta.selectionEnd);
      ta.selectionStart = ta.selectionEnd = s + 2;
    });

    // ── 起動 ────────────────────────────────────────────────
    document.getElementById('editor').value = '';
    document.getElementById('sample-code-pre').textContent = SAMPLE;
    document.getElementById('editor').addEventListener('input', scheduleRender);
    render();
  </script>
</body>

</html>
